<style id="zenlm-overrides">
/* Enso dot→circle animation: scale grows from a dot to full size.
   The stroke itself stays fully drawn (no dasharray clipping) — the
   "grow" effect comes from the SVG transform animation. */
@keyframes zenlm-dot-to-circle {
  0%   { transform: scale(0.05); opacity: 0.4; }
  60%  { opacity: 1; }
  100% { transform: scale(1); opacity: 1; }
}
@keyframes zenlm-brush-tip-travel {
  0%   { offset-distance: 0%; opacity: 1; r: 8; }
  50%  { opacity: 1; r: 13; }
  100% { offset-distance: 100%; opacity: 0; r: 6; }
}
[aria-label="Zen LM"] svg {
  transform-origin: center center;
  animation: zenlm-dot-to-circle 1.0s cubic-bezier(.2,.9,.25,1) 1 forwards;
}
[aria-label="Zen LM"] svg path {
  /* Keep the circle fully visible at all times. */
  stroke-dasharray: none !important;
  stroke-dashoffset: 0 !important;
  animation: none !important;
}

[aria-label="Zen LM"] svg .zenlm-brush-tip {
  offset-path: path("M 84 256 A 172 172 0 1 0 428 256 A 172 172 0 1 0 84 256 Z");
  offset-rotate: 0deg;
  fill: currentColor;

}
